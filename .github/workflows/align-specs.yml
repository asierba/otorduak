name: Align Specs

on:
  schedule:
    - cron: '45 10 * * *'
  workflow_dispatch:

jobs:
  align:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create MCP config
        run: |
          cat > /tmp/mcp-config.json << EOF
          {
            "mcpServers": {
              "atlassian-jira": {
                "command": "npx",
                "args": ["-y", "@aashari/mcp-server-atlassian-jira"],
                "env": {
                  "ATLASSIAN_SITE_NAME": "${{ secrets.ATLASSIAN_SITE_NAME }}",
                  "ATLASSIAN_USER_EMAIL": "${{ secrets.ATLASSIAN_USER_EMAIL }}",
                  "ATLASSIAN_API_TOKEN": "${{ secrets.ATLASSIAN_API_TOKEN }}"
                }
              },
              "atlassian-confluence": {
                "command": "npx",
                "args": ["-y", "@aashari/mcp-server-atlassian-confluence"],
                "env": {
                  "ATLASSIAN_SITE_NAME": "${{ secrets.ATLASSIAN_SITE_NAME }}",
                  "ATLASSIAN_USER_EMAIL": "${{ secrets.ATLASSIAN_USER_EMAIL }}",
                  "ATLASSIAN_API_TOKEN": "${{ secrets.ATLASSIAN_API_TOKEN }}"
                }
              }
            }
          }
          EOF

      - name: Run align-spec
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/d3:align-spec all. Write the full deviation report in markdown to /tmp/align-report.md"
          claude_args: "--mcp-config /tmp/mcp-config.json"
          show_full_output: true
          plugin_marketplaces: "https://github.com/cdiniz/dialog-driven-delivery.git"
          plugins: "d3@d3-marketplace"

      - name: Add report to summary
        if: always()
        run: |
          if [ -f /tmp/align-report.md ]; then
            cat /tmp/align-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No report file generated. Check the action logs." >> "$GITHUB_STEP_SUMMARY"
          fi
